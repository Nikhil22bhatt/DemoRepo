<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="description" content="AEM Sidekick Library" />
    <meta name="robots" content="noindex" />
    <base href="/" />
    <style>
      :root {
        --sk-block-table-background-color: #026169;
        --sk-block-table-foreground-color: #fff;
        --sk-section-metadata-table-background-color: #171c29;
        --sk-section-metadata-table-foreground-color: #fff;
        --sk-metadata-table-background-color: #cbe7f0;
        --sk-metadata-table-foreground-color: #171c29;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: adobe-clean, sans-serif;
        background-color: #f3f6f2;
      }

      helix-sidekick,
      aem-sidekick {
        display: none;
      }
    </style>
    <title>Sidekick Library</title>
  </head>
  <body>
    <script
      type="module"
      src="https://www.aem.live/tools/sidekick/library/index.js"
    ></script>
    <script>
      const library = document.createElement('sidekick-library');
      library.config = {
        base: '/tools/sidekick/library.json',
      };

      document.body.prepend(library);
    </script>
  </body>
</html>
